<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECOFIN Attendance</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
    .app-container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
    .punch-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .punch-in { background: #2ecc71; }
    .punch-out { background: #e74c3c; }
  </style>
</head>
<body>
  <div class="app-container">
    <h2>ECOFIN Attendance</h2>
    <input type="text" id="empId" placeholder="Enter Employee ID">
    <input type="text" id="empName" placeholder="Enter Your Name">
    <select id="attendanceType" onchange="toggleRemarks()">
      <option value="At Branch">At Branch (Office)</option>
      <option value="On Customer Site">On Customer Site</option>
      <option value="Field Work">Field Work / Marketing</option>
      <option value="Other">Other</option>
    </select>
    <textarea id="remarksBox" style="display:none;" placeholder="Enter remarks..."></textarea>
    <button class="punch-btn punch-in" onclick="submitPunch('IN')">PUNCH IN</button>
    <button class="punch-btn punch-out" onclick="submitPunch('OUT')">PUNCH OUT</button>
    <p id="status"></p>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzh6vy4NKyxM1I7KXfVV8lWIv5qHxQs15fxW2JtAFURRJAEzuhxBLne8KaVbpNm9_a2WA/exec";

    function toggleRemarks() {
      document.getElementById('remarksBox').style.display = (document.getElementById('attendanceType').value === "Other") ? "block" : "none";
    }

    async function submitPunch(action) {
      const status = document.getElementById('status');
      status.innerText = "Processing...";
      
      navigator.geolocation.getCurrentPosition(async (pos) => {
        const payload = {
          empId: document.getElementById('empId').value,
          name: document.getElementById('empName').value,
          action: action,
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          type: document.getElementById('attendanceType').value,
          remarks: document.getElementById('remarksBox').value
        };

        try {
          await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          status.innerText = "Success! Data sent.";
        } catch (e) {
          status.innerText = "Error: " + e.message;
        }
      });
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
