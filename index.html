<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ECOFIN Attendance Desk</title>
  <style>
    :root {
      /* Premium Coral Sunset Gradient Design System */
      --primary-gradient: linear-gradient(135deg, #ff7e5f, #feb47b);
      --banking-dark: #2d3748;
      --banking-slate: #718096;
      --card-bg: #ffffff;
      --shadow: 0 15px 40px rgba(239, 126, 95, 0.25);
      --success: #2ecc71;
      --danger: #e74c3c;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    }
    
    body { 
      background: var(--primary-gradient); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 20px; 
    }
    
    .app-container { 
      background: var(--card-bg); 
      width: 100%; 
      max-width: 430px; 
      border-radius: 24px; 
      box-shadow: var(--shadow); 
      padding: 35px 24px; 
      text-align: center; 
    }
    
    .branding-header { 
      margin-bottom: 22px; 
    }
    
    .logo-frame { 
      width: 150px; 
      height: 80px; 
      background: #ffffff; 
      border-radius: 12px; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      margin-bottom: 12px; 
      overflow: hidden; 
    }
    
    .logo-frame svg, .logo-frame img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
    }
    
    .main-title { 
      font-size: 18px; 
      font-weight: 800; 
      color: var(--banking-dark); 
      letter-spacing: 0.2px; 
      line-height: 1.3; 
    }
    
    .subtitle { 
      font-size: 11px; 
      color: var(--banking-slate); 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      margin-top: 6px; 
      font-weight: 700; 
    }
    
    .divider { 
      height: 1px; 
      background: #edf2f7; 
      margin: 20px 0; 
    }

    .employee-box { 
      background: #fff5f2; 
      border-radius: 18px; 
      padding: 22px 16px; 
      margin-bottom: 22px; 
      border: 1px solid #ffebe5; 
    }
    
    .avatar-wrapper { 
      position: relative; 
      width: 115px; 
      height: 115px; 
      margin: 0 auto 14px; 
    }
    
    .avatar-wrapper svg, .avatar { 
      width: 100%; 
      height: 100%; 
      border-radius: 50%; 
      object-fit: cover; 
      border: 4px solid #fff; 
      box-shadow: 0 4px 15px rgba(239, 126, 95, 0.15); 
      background-color: #ffebe5; 
    }
    
    .emp-name { 
      font-size: 19px; 
      font-weight: 700; 
      color: var(--banking-dark); 
    }
    
    .emp-id { 
      font-size: 12px; 
      color: #a0aec0; 
      font-weight: 600; 
      margin-top: 3px; 
    }

    .telemetry-row { 
      display: flex; 
      justify-content: space-between; 
      margin-top: 18px; 
      background: #fff; 
      padding: 12px; 
      border-radius: 14px; 
      border: 1px solid #edf2f7; 
    }
    
    .telemetry-item { 
      flex: 1; 
      text-align: center; 
    }
    
    .telemetry-item:first-child { 
      border-right: 1px solid #edf2f7; 
    }
    
    .tel-label { 
      font-size: 10px; 
      text-transform: uppercase; 
      color: var(--banking-slate); 
      letter-spacing: 0.5px; 
      margin-bottom: 4px; 
    }
    
    .tel-val { 
      font-size: 14px; 
      font-weight: 700; 
      color: var(--banking-dark); 
    }

    .control-label { 
      text-align: left; 
      font-size: 11px; 
      font-weight: 700; 
      color: var(--banking-dark); 
      margin-bottom: 8px; 
      display: block; 
      padding-left: 2px; 
      letter-spacing: 0.5px; 
    }
    
    .styled-select { 
      width: 100%; 
      padding: 14px; 
      border-radius: 12px; 
      border: 2px solid #e2e8f0; 
      background-color: #fff; 
      font-size: 15px; 
      font-weight: 600; 
      color: var(--banking-dark); 
      outline: none; 
      margin-bottom: 22px; 
      appearance: none; 
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a5568' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
      background-repeat: no-repeat; 
      background-position: right 14px center; 
      background-size: 16px; 
    }
    
    .styled-select:focus { 
      border-color: #ff7e5f; 
    }

    .action-btn { 
      width: 100%; 
      background: linear-gradient(135deg, #ff7e5f, #feb47b); 
      border: none; 
      color: white; 
      padding: 16px; 
      border-radius: 12px; 
      font-size: 16px; 
      font-weight: 700; 
      cursor: pointer; 
      box-shadow: 0 6px 18px rgba(253, 126, 95, 0.4); 
      transition: all 0.2s ease; 
      letter-spacing: 0.5px; 
    }
    
    .action-btn:disabled { 
      background: #cbd5e1; 
      box-shadow: none; 
      cursor: not-allowed; 
    }

    .status-toast { 
      margin-top: 18px; 
      padding: 14px; 
      border-radius: 12px; 
      font-size: 14px; 
      font-weight: 600; 
      display: none; 
      line-height: 1.5; 
      text-align: left; 
      white-space: pre-line; 
    }
    
    .status-toast.info { background: #fff8f5; color: #dd6b20; display: block; border: 1px solid #fbd38d;}
    .status-toast.success { background: #eafaf1; color: #27ae60; display: block; border: 1px solid #d4efdf;}
    .status-toast.error { background: #fdeaea; color: var(--danger); display: block; border: 1px solid #fadbd8;}

    .blocking-overlay { 
      position: fixed; 
      top:0; left:0; 
      width:100vw; height:100vh; 
      background: rgba(255,255,255,0.97); 
      z-index: 9999; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      padding: 30px; 
      text-align: center; 
    }
    
    .blocking-overlay h2 { color: var(--banking-dark); margin-bottom: 10px; font-size: 21px; }
    .blocking-overlay p { color: var(--banking-slate); font-size: 14px; max-width: 300px; line-height: 1.5; }
    
    .spinner { 
      border: 4px solid rgba(0,0,0,0.05); 
      width: 45px; height: 45px; 
      border-radius: 50%; 
      border-left-color: #ff7e5f; 
      animation: spin 1s linear infinite; 
      margin-bottom: 20px; 
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="lockOverlay" class="blocking-overlay">
    <div class="spinner" id="lockSpinner"></div>
    <h2 id="lockTitle">Initializing Profile</h2>
    <p id="lockDesc">Validating handshake protocols...</p>
  </div>

  <div class="app-container">
    <div class="branding-header">
      <div class="logo-frame">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 5 L85 20 L85 55 C85 75 50 95 50 95 C50 95 15 75 15 55 L15 20 Z" fill="#ff7e5f" />
          <path d="M50 12 L78 24 L78 53 C78 70 50 86 50 86 C50 86 22 70 22 53 L22 24 Z" fill="#ffffff" />
          <path d="M43 35 L57 35 L57 65 L43 65 Z" fill="#ff7e5f" />
          <path d="M35 43 L65 43 L65 57 L35 57 Z" fill="#ff7e5f" />
        </svg>
      </div>
      <h1 class="main-title">ECOFIN CREDIT SOUHARDA CO-OP LTD</h1>
      <p class="subtitle">Employee Attendance</p>
    </div>

    <div class="divider"></div>

    <div class="employee-box">
      <div class="avatar-wrapper" id="avatarContainer">
        <svg id="defaultAvatarSvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="50" fill="#ff7e5f" opacity="0.1"/>
          <circle cx="50" cy="40" r="18" fill="#ff7e5f"/>
          <path d="M20 80 C20 62 34 56 50 56 C66 56 80 62 80 80 Z" fill="#ff7e5f"/>
        </svg>
        <img id="empAvatar" src="" class="avatar" alt="Employee Photo" style="display: none;" />
      </div>
      <div class="emp-name" id="empNameDisplay">---</div>
      <div class="emp-id" id="empIdDisplay">ID: ----</div>
      
      <div class="telemetry-row">
        <div class="telemetry-item">
          <p class="tel-label">Device Clock</p>
          <p class="tel-val" id="liveClock">00:00:00</p>
        </div>
        <div class="telemetry-item">
          <p class="tel-label">Branch Distance</p>
          <p class="tel-val" id="distanceDisplay">Locating...</p>
        </div>
      </div>
    </div>

    <div>
      <label class="control-label">SELECT ATTENDANCE TYPE</label>
      <select id="actionType" class="styled-select">
        <option value="IN">PUNCH IN (Begin Shift)</option>
        <option value="OUT">PUNCH OUT (End Shift)</option>
      </select>
      <button id="submitBtn" class="action-btn" onclick="submitLogRecord()" disabled>MARK ATTENDANCE</button>
    </div>

    <div id="toastBox" class="status-toast"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetEmpId = urlParams.get('empId');
    
    // Configured live Google Script endpoint interface
    const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbxp0LXfzP-YPNJ9uiU4C4MPg8EPXYH0nWgzhekot_5B5hj4QymO3i9heCn2TQWSAotS/exec";

    let officeLat, officeLong, maxAllowedRadius, userCoords;

    setInterval(() => {
      document.getElementById('liveClock').innerText = new Date().toTimeString().split(' ')[0];
    }, 1000);

    window.addEventListener('DOMContentLoaded', () => {
      if (!targetEmpId) {
        showFatalBlock("Access Error", "Authentication signature parameter is missing from the link URL structure.");
        return;
      }
      fetchProfileData();
    });

    function showFatalBlock(title, msg) {
      document.getElementById('lockSpinner').style.display = 'none';
      document.getElementById('lockTitle').innerText = title;
      document.getElementById('lockDesc').innerText = msg;
      document.getElementById('lockOverlay').style.display = 'flex';
    }

    function fetchProfileData() {
      fetch(API_ENDPOINT, {
        method: "POST",
        body: JSON.stringify({ route: "getDetails", empId: targetEmpId })
      })
      .then(res => res.json())
      .then(response => {
        if (!response.success) {
          showFatalBlock("Authentication Rejected", response.message);
          return;
        }
        document.getElementById('empNameDisplay').innerText = response.employee.name;
        document.getElementById('empIdDisplay').innerText = "ID: " + response.employee.empId;
        
        if(response.employee.photoUrl) {
          let cleanPhoto = response.employee.photoUrl;
          if (cleanPhoto.includes("drive.google.com")) {
            let match = cleanPhoto.match(/[-\w]{25,}/);
            if (match) cleanPhoto = "https://drive.google.com/uc?export=view&id=" + match[0];
          }
          const imgEl = document.getElementById('empAvatar');
          imgEl.src = cleanPhoto;
          imgEl.onload = function() {
            document.getElementById('defaultAvatarSvg').style.display = 'none';
            imgEl.style.display = 'block';
          };
        }
        
        officeLat = parseFloat(response.settings.OfficeLat);
        officeLong = parseFloat(response.settings.OfficeLong);
        maxAllowedRadius = parseFloat(response.settings.AllowedRadiusMeters);
        
        initiateTrackingGPS();
      })
      .catch(err => showFatalBlock("Cloud Offline", "Connection timeout to Sheets Engine. Verify script deployment access configuration settings."));
    }

    function initiateTrackingGPS() {
      if (!navigator.geolocation) {
        showFatalBlock("Hardware Exception", "This device does not support standard GPS telemetries.");
        return;
      }
      navigator.geolocation.watchPosition(onGPSCoords, onGPSError, { enableHighAccuracy: true, timeout: 12000 });
    }

    function calcDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function onGPSCoords(pos) {
      userCoords = pos.coords;
      let dist = calcDistance(userCoords.latitude, userCoords.longitude, officeLat, officeLong);
      let displayDist = Math.round(dist);
      document.getElementById('distanceDisplay').innerText = displayDist + " m";

      if (dist <= maxAllowedRadius) {
        document.getElementById('lockOverlay').style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
      } else {
        document.getElementById('submitBtn').disabled = true;
        showToast("error", "OUT OF BOUNDS: You are " + displayDist + "m away from the branch.");
        showFatalBlock("Geofence Range Violation", "You are currently outside the perimeter (" + displayDist + "m away). Move inside the branch limits.");
      }
    }

    function onGPSError() {
      showFatalBlock("GPS Core Locked", "Please enable high-accuracy device location tracking and give browser permissions.");
    }

    function showToast(type, msg) {
      const box = document.getElementById('toastBox');
      box.className = "status-toast " + type;
      box.innerText = msg;
    }

    function submitLogRecord() {
      document.getElementById('submitBtn').disabled = true;
      showToast("info", "Processing transaction tokens...");
      
      fetch(API_ENDPOINT, {
        method: "POST",
        body: JSON.stringify({
          route: "process",
          empId: targetEmpId,
          actionType: document.getElementById('actionType').value,
          lat: userCoords.latitude,
          lng: userCoords.longitude
        })
      })
      .then(res => res.json())
      .then(result => {
        document.getElementById('submitBtn').disabled = false;
        if (result.success) {
          showToast("success", result.message);
        } else {
          showToast("error", result.message);
        }
      })
      .catch(err => {
        document.getElementById('submitBtn').disabled = false;
        showToast("error", "API Communication lost: " + err.message);
      });
    }
  </script>
</body>
</html>
